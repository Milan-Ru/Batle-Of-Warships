:root{ --radius:10px; --font-logo:'Anton', sans-serif; }
/* Palet ala Meta */
[data-theme="dark"]{

  --border:#3e4042; --accent:#1877F2; --accent-bright:#4293fb;

}
[data-theme="light"]{

  --border:#ced0d4; --accent:#1877F2; --accent-bright:#0a5cd6;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background .3s,color .3s}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:20px;font-size:.82rem;z-index:500;transition:transform .3s ease;max-width:90%;text-align:center}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite}

</style>

<script>
// ================= CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyDGKQuxfKxF0rItQ52XX9gPyguo71hMXOo",
  authDomain: "batle-of-warships.firebaseapp.com",
  projectId: "batle-of-warships",
  storageBucket: "batle-of-warships.firebasestorage.app",
  messagingSenderId: "59053224895",
  appId: "1:59053224895:web:f48d63020f96a4d5e3e70a"
};
const IMGBB_KEY = "a445c323b1b7e93a89ff6c6ca0b83dd9";
const MAX_UPLOAD_MB = 3;
const TARGET_COMPRESS_MB = 1;
const AI_CHAR_LIMIT_PER_CHAT = 700;
const EDIT_WINDOW_MS = 15 * 60 * 1000;
const DELETE_WINDOW_MS = 10 * 24 * 60 * 60 * 1000;
const SEND_THROTTLE_MS = 3000;
const API_ENDPOINT = "/.netlify/functions/api";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let currentUser = null;
let userProfile = null;
let lastSendTime = 0;

// ================= UTIL =================
function toast(msg, ms = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), ms);
}
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
const BAD_WORDS = ["anjing", "bangsat", "kontol", "memek", "goblok"];
function filterText(text) {
  let out = text;
  BAD_WORDS.forEach(w => { out = out.replace(new RegExp(w, "gi"), "*".repeat(w.length)); });
  return out;
}
function timeAgo(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "baru saja";
  if (diff < 3600) return Math.floor(diff / 60) + " menit lalu";
  if (diff < 86400) return Math.floor(diff / 3600) + " jam lalu";
  return d.toLocaleDateString("id-ID");
}
function canEdit(ts) {
  if (!ts) return false;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return (Date.now() - d.getTime()) < EDIT_WINDOW_MS;
}
function canDelete(ts) {
  if (!ts) return false;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return (Date.now() - d.getTime()) < DELETE_WINDOW_MS;
}
function throttledOk() {
  const now = Date.now();
  if (now - lastSendTime < SEND_THROTTLE_MS) {
    toast("Tunggu sebentar sebelum kirim lagi");
    return false;
  }
  lastSendTime = now;
  return true;
}
function showUndoSnackbar(label, onConfirmDelete, onUndo) {
  const bar = document.getElementById("undoSnackbar");
  const btn = document.getElementById("undoBtn");
  document.getElementById("undoText").textContent = label;
  bar.style.transform = "translateX(-50%) translateY(0)";
  let undone = false;
  const timer = setTimeout(() => {
    if (!undone) onConfirmDelete();
    bar.style.transform = "translateX(-50%) translateY(100px)";
  }, 5000);
  btn.onclick = () => {
    undone = true;
    clearTimeout(timer);
    bar.style.transform = "translateX(-50%) translateY(100px)";
    onUndo();
  };
}

async function callApi(action, payload) {
  const idToken = currentUser ? await currentUser.getIdToken() : null;
  const res = await fetch(API_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, payload, idToken })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Request gagal");
  return data.result;
}

// ================= KOMPRESI FOTO =================
function compressImage(file, targetMB = TARGET_COMPRESS_MB) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      const maxDim = 1600;
      if (width > maxDim || height > maxDim) {
        const ratio = Math.min(maxDim / width, maxDim / height);
        width = Math.round(width * ratio); height = Math.round(height * ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      let quality = 0.85;
      const tryCompress = () => {
        canvas.toBlob(blob => {
          if (!blob) return reject(new Error("Kompresi gagal"));
          if (blob.size / (1024 * 1024) > targetMB && quality > 0.4) { quality -= 0.1; tryCompress(); }
          else resolve(new File([blob], file.name, { type: "image/jpeg" }));
        }, "image/jpeg", quality);
      };
      tryCompress();
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadToImgbb(file) {
  let toSend = file;
  if (file.size / (1024 * 1024) > TARGET_COMPRESS_MB) {
    try { toSend = await compressImage(file); } catch { toSend = file; }
  }
  const formData = new FormData();
  formData.append("image", toSend);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
  const data = await res.json();
  if (!data.success) throw new Error("Upload foto gagal");
  return data.data.url;
}

  const ref = db.collection("posts").doc(postId);

  }).catch(err => toast("Gagal: " + err.message));
}

function showReactionPicker(msgId, anchorBtn) {
  document.querySelectorAll(".reaction-picker").forEach(p => p.remove());
  const picker = document.createElement("div");
  picker.className = "reaction-picker";
  picker.innerHTML = REACTION_EMOJIS.map(e => `<span data-emoji="${e}">${e}</span>`).join("");
  anchorBtn.parentElement.style.position = "relative";
  anchorBtn.parentElement.appendChild(picker);
  picker.addEventListener("click", e => {
    const emoji = e.target.dataset.emoji;
    if (emoji) toggleReaction(msgId, emoji);
    picker.remove();
  });
  setTimeout(() => document.addEventListener("click", function close(ev) {
    if (!picker.contains(ev.target) && ev.target !== anchorBtn) { picker.remove(); document.removeEventListener("click", close); }
  }), 10);
}

    reactions[emoji] = uids.includes(currentUser.uid) ? uids.filter(u => u !== currentUser.uid) : [...uids, currentUser.uid];
    t.update(ref, { reactions });

function clearAiHistory() {
  if (!currentUser) { toast("Login dulu ya"); return; }
  if (!confirm("Hapus semua riwayat chat AI? Tidak bisa dibatalkan.")) return;
  callApi("clearAiHistory", { uid: currentUser.uid })
    .then(() => { toast("Riwayat dihapus"); document.getElementById("aiMessages").innerHTML = ""; })
    .catch(err => toast("Gagal: " + err.message));
}
</script>
